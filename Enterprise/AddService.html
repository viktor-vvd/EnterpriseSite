        }

    <script>

        window.onscroll = function () {
            scrollMy();
        }
        function scrollMy() {
            let windowScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (windowScroll / docHeight) * 100;
            document.getElementById('myBar').style.height = scrolled + '%';

        }
        window.addEventListener('scroll', function () {
            if (pageYOffset > 30) {
                document.getElementById('imm').style.transform = "rotate(0deg)";
                document.getElementById('upp').href = "#frame";
            }
            else {
                document.getElementById('imm').style.transform = "rotate(180deg)";
                document.getElementById('upp').href = "#addmy";
            }
        });
        function Loading() {
            document.getElementById('loading').style.height = "1000px";
            document.getElementById('loading').style.paddingTop = (window.screen.availHeight / 2 - 50) + "px";
            document.getElementById('llogodiv').style.marginLeft = (window.screen.availWidth / 2-50) + "px";
            document.getElementById('Enterprise').style.marginLeft = (window.screen.availWidth / 2 - 156.5) + "px";
            setTimeout(Showw, 1750);
            setTimeout(Showww, 3300);
            setTimeout(Lend, 4300);
            setTimeout(Lendd, 4900);
            document.body.style.overflow = "hidden";
        }
        function Showw() {
            document.getElementById('llogodiv').style.transform = "translateX(-106.5px)";
        }
        function Showww() {
            document.getElementById('Enterprise').style.opacity = "1";

        }
        function Lend() {
            document.getElementById('loading').style.opacity = "0";

        }
        function Lendd() {
            document.getElementById('loading').style.display = "none";
            document.body.style.overflow = "visible";
        }
        window.onload(Loading());

    </script>
