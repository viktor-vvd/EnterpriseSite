<!DOCTYPE html>
<html>
<head>
    <title></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.7.2/animate.min.css">
    <link href="https://fonts.googleapis.com/css?family=Raleway&display=swap" rel="stylesheet">

    <meta charset="utf-8" />
    <style>
        body {
            padding: 0px;
            margin: 0px;
            font-family: 'Raleway', sans-serif;
        }

        #loading {
            background-color: #12171a;
            margin: 0px;
            width: 100%;
            height: 100%;
            transition: opacity 0.6s ease;
            position: absolute;
        }

        #llogodiv {
            color: white;
            width: 100px;
            height: 100px;
            background-color: dimgrey;
            margin: auto;
            text-align: center;
            line-height: 100px;
            transition-duration: 2s;
            -webkit-animation-name: fade;
            -webkit-animation-duration: 1.5s;
            animation-name: fade;
            animation-duration: 1.5s;
        }
          @-webkit-keyframes fade {
               from{opacity: 0}
               to{opacity: 1}
          }
          @keyframes fade {
               from{opacity: 0}
               to{opacity: 1}
          }

        #llogodiv {
            opacity: 1;
        }

        #llogo {
            display: inline-block;
            color: white;
            font-size: 50px;
            margin: auto;
            white-space: nowrap;
        }

        #llogodiv1 {
            color: white;
            width: 100px;
            height: 100px;
            background-color: dimgrey;
            margin: auto;
            text-align: center;
            line-height: 100px;
            display: inline-block;
        }

        #llogotext {
            color: white;
            margin: auto;
            text-align: center;
            line-height: 100px;
            font-size: 40px;
            margin-left: 20px;
        }

        #llogo1 {
            display: inline-block;
            color: white;
            font-size: 50px;
            margin: auto;
            white-space: nowrap;
        }

        #Enterprise {
            margin: auto;
            text-align: center;
            position: absolute;
            width: 313px;
            opacity:0;
            transition: opacity 0.6s ease;
        }
    </style>
    <script>
        let H = window.screen.availHeight;
        let W = window.screen.availWidth;
        function Loading() {
            document.getElementById('loading').style.width = W + "px";
            document.getElementById('loading').style.height = H + "px";
            document.getElementById('loading').style.paddingTop = (H / 2 - 50) + "px";
            document.getElementById('Enterprise').style.marginLeft = (window.screen.availWidth / 2 - 156.5) + "px";
            setTimeout(Showw, 1750);
            setTimeout(Showww, 3300);
            setTimeout(Lend, 4300);
            document.body.style.overflow = "hidden";
        }
        function Showw() {
            document.getElementById('llogodiv').style.transform = "translateX(-106.5px)";
        }
        function Showww() {
            document.getElementById('Enterprise').style.opacity = "1";

        }
        function Lend() {
            document.getElementById('loading').style.opacity = "0";

        }
        window.onload(Loading());
    </script>
</head>
<body>
    <div id="loading">
        <div id="Enterprise">
            <div id="llogodiv1">
                <span id="llogo1">E</span>
            </div>
            <span id="llogotext"><span>Enter</span><span style="color: dimgrey;">prise</span></span>
        </div>
        <div id="llogodiv">
            <span id="llogo">E</span>
        </div>

    </div>
    <script>
        Loading();
    </script>
</body>
</html>
