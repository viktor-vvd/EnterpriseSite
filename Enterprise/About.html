    <style>
        body {

        }

        #frame {

            padding: 0px;

            font-size: 20px;
            position: fixed;
            z-index: 3;
        }

        #main a {
            color: White;
        }

        a {
            text-decoration: none;

        }

        #main {
            margin: 0px;
            padding-left: 5px;

        }

        #logoreg {
            width: 90.9%;
            position: center;
            float: right;
            text-align: center;

        }

        #reg {

        }

        #ii {

        #i1 {
            width: 1910px;
            height: 25px;

        #ii:hover {

        }

            #ii:hover #i1 {
                transform-origin: left;
                transform: translateX(-15px);

                transition-timing-function: ease-in-out;
            }

        #whatis {
            color:white;

        #textdiv {

        #aimgdiv {

        }
        #aimgdiv img {
            width: 100%;
        }

        #newstime {

            display: block;

        }

        #newstimetext {
            float: right;
            //text-align:right;
            font-size: 32px;
            margin: 20px;
            margin-top: 70px;
        }

        #cont {
            width: 100%;
            height: 100%;
        }


        .im {
            transition-duration: 1s;
        }

            .im:hover {
                transform: scaleX(1.015) scaleY(1.015);
                transition-timing-function: ease-in-out;
            }

        #_up {
            width: 100%;
            position: fixed;
            right: 0px;
            bottom: 0px;
            z-index: 4;
        }

            #_up div {
                width: 60px;
                height: 60px;
                background-color: #010102;
                float: right;
            }

        #imm {
            width: 60px;
            float: right;
        }

        #imm {
            transition-duration: 0.2s;
            transition-timing-function: ease-in-out;
            transform: rotate(180deg);
        }

        .progressContainer {
            width: 10px;
            height: 0.25%;
            background: none;
            left: 0px;
            top: 0px;
            right: 0px;
            position: fixed;
            z-index: 2;
        }

        .progressBar {
            height: 0%;
            background: #010102;
            width: 100%;
            z-index: 1;
        }
          #loading {
            background-color: #12171a;
            margin: 0px;
            width: 100%;
            height: 100%;
            transition: opacity 0.6s ease;
            position: absolute;
            z-index: 5;
        }

        #llogodiv {
            color: white;
            width: 100px;
            height: 100px;
            background-color: dimgrey;
            margin: auto;
            text-align: center;
            line-height: 100px;
            transition-duration: 2s;
            -webkit-animation-name: fade;
            -webkit-animation-duration: 1.5s;
            animation-name: fade;
            animation-duration: 1.5s;
        }
          @-webkit-keyframes fade {
               from{opacity: 0}
               to{opacity: 1}
          }
          @keyframes fade {
               from{opacity: 0}
               to{opacity: 1}
          }

        #llogodiv {
            opacity: 1;
            position: fixed;
        }

        #llogo {
            display: inline-block;
            color: white;
            font-size: 50px;
            margin: auto;
            white-space: nowrap;
        }

        #llogodiv1 {
            color: white;
            width: 100px;
            height: 100px;
            background-color: dimgrey;
            margin: auto;
            text-align: center;
            line-height: 100px;
            display: inline-block;
        }

        #llogotext {
            color: white;
            margin: auto;
            text-align: center;
            line-height: 100px;
            font-size: 40px;
            margin-left: 20px;
        }

        #llogo1 {
            display: inline-block;
            color: white;
            font-size: 50px;
            margin: auto;
            white-space: nowrap;
        }

        #Enterprise {
            margin: auto;
            text-align: center;
            position: absolute;
            width: 313px;
            opacity:0;
            transition: opacity 0.6s ease;
            position: fixed;
        }
    </style>
    <script>

        window.onscroll = function () {
            scrollMy();
        }
        function scrollMy() {
            let windowScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (windowScroll / docHeight) * 100;
            document.getElementById('myBar').style.height = scrolled + '%';

        }
        window.addEventListener('scroll', function () {
            if (pageYOffset > 30) {
                document.getElementById('imm').style.transform = "rotate(0deg)";
                document.getElementById('upp').href = "#frame";
            }
            else {
                document.getElementById('imm').style.transform = "rotate(180deg)";
                document.getElementById('upp').href = "#newstime";
            }
        });
                    function Loading() {
            document.getElementById('loading').style.height = "1400px";
            document.getElementById('loading').style.paddingTop = (window.screen.availHeight / 2 - 50) + "px";
            document.getElementById('llogodiv').style.marginLeft = (window.screen.availWidth / 2-50) + "px";
            document.getElementById('Enterprise').style.marginLeft = (window.screen.availWidth / 2 - 156.5) + "px";
            setTimeout(Showw, 1750);
            setTimeout(Showww, 3300);
            setTimeout(Lend, 4300);
            setTimeout(Lendd, 4900);
            document.body.style.overflow = "hidden";
        }
        function Showw() {
            document.getElementById('llogodiv').style.transform = "translateX(-106.5px)";
        }
        function Showww() {
            document.getElementById('Enterprise').style.opacity = "1";

        }
        function Lend() {
            document.getElementById('loading').style.opacity = "0";

        }
        function Lendd() {
            document.getElementById('loading').style.display = "none";
            document.body.style.overflow = "visible";
        }
        window.onload(Loading());

</script>
</head>
<body>
    <div id="loading">
        <div id="Enterprise">

        </div>

            </div>
